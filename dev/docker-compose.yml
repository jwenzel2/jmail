# Development-only services for verifying jmail locally.
# NOT a production artifact — production connects to your real servers.
#
#   docker compose -f dev/docker-compose.yml up -d
#
# Keycloak (OIDC provider with the jmail realm pre-imported) on :8080.
# Admin console: http://localhost:8080  (admin / admin)
# Test users in the jmail realm: alice/password (admin), bob/password.
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ['start-dev', '--import-realm']
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: 'true'
      KC_HOSTNAME_STRICT: 'false'
    ports:
      - '8080:8080'
    volumes:
      - ../packaging/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ['CMD-SHELL', "exec 3<>/dev/tcp/localhost/8080 && echo ok >&3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  # Dovecot + Postfix, authenticating jmail's XOAUTH2 tokens against Keycloak's
  # userinfo endpoint. Accounts are provisioned after start (see scripts/dev-mail-setup.sh).
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:14.0
    hostname: mail.example.com
    environment:
      ENABLE_OAUTH2: '1'
      OAUTH2_INTROSPECTION_URL: 'http://keycloak:8080/realms/jmail/protocol/openid-connect/userinfo'
      SSL_TYPE: self-signed
      PERMIT_DOCKER: connected-networks
      # Trim the stack for fast dev startup (spam/av handled in Milestone 3).
      ENABLE_CLAMAV: '0'
      ENABLE_RSPAMD: '0'
      ENABLE_AMAVIS: '0'
      ENABLE_SPAMASSASSIN: '0'
      ENABLE_FAIL2BAN: '0'
      ENABLE_POSTGREY: '0'
      SPOOF_PROTECTION: '0'
      LOG_LEVEL: info
    ports:
      - '1143:143'
      - '1993:993'
      - '1587:587'
      - '1465:465'
    volumes:
      - ./data/dms/mail:/var/mail
      - ./data/dms/state:/var/mail-state
      - ./data/dms/logs:/var/log/mail
      - ./data/dms/config:/tmp/docker-mailserver
    cap_add:
      - NET_ADMIN
    depends_on:
      keycloak:
        condition: service_healthy
