# jmail — train SpamAssassin from webmail actions via Dovecot IMAPSieve.
#
# When jmail moves a message INTO Junk, report-spam.sieve runs `sa-learn --spam`;
# moving a message OUT of Junk runs `sa-learn --ham`. Per-user Bayes is keyed by
# the IMAP username. Requires the dovecot-pigeonhole (sieve) package.
#
#   !include conf.d/90-imapsieve.conf
# Then compile the scripts:  sievec /etc/dovecot/sieve/report-spam.sieve  (and report-ham)

protocol imap {
  mail_plugins = $mail_plugins imap_sieve
}

plugin {
  sieve_plugins = sieve_imapsieve sieve_extprograms

  # 1) Any mailbox -> Junk  (COPY/APPEND): learn as spam.
  imapsieve_mailbox1_name = Junk
  imapsieve_mailbox1_causes = COPY APPEND
  imapsieve_mailbox1_before = file:/etc/dovecot/sieve/report-spam.sieve

  # 2) Junk -> any mailbox  (COPY): learn as ham.
  imapsieve_mailbox2_name = *
  imapsieve_mailbox2_from = Junk
  imapsieve_mailbox2_causes = COPY
  imapsieve_mailbox2_before = file:/etc/dovecot/sieve/report-ham.sieve

  sieve_pipe_bin_dir = /etc/dovecot/sieve
  sieve_global_extensions = +vnd.dovecot.pipe +vnd.dovecot.environment
}
